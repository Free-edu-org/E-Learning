name: Deploy FreeEdu

on:
  push:
    branches:
      - deploy/azure-prod
    paths:
      - "backend/**"
      - "frontend/**"
      - "stt-service/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy-backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push Backend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-backend:${{ github.sha }} -f backend/Dockerfile.prod backend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-backend:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: freeedu-backend
          resourceGroup: freeedu-rg
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-backend:${{ github.sha }}

  deploy-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push Frontend
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-frontend:${{ github.sha }} -f frontend/Dockerfile.prod frontend
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-frontend:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: freeedu-frontend
          resourceGroup: freeedu-rg
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-frontend:${{ github.sha }}

  deploy-stt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build and push STT Service
        run: |
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-stt:${{ github.sha }} -f stt-service/Dockerfile.prod stt-service
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-stt:${{ github.sha }}

      - name: Deploy to Azure Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          containerAppName: freeedu-stt
          resourceGroup: freeedu-rg
          imageToDeploy: ${{ secrets.ACR_LOGIN_SERVER }}/freeedu-stt:${{ github.sha }}

  notify:
    runs-on: ubuntu-latest
    needs: [deploy-backend, deploy-frontend, deploy-stt]
    if: always()
    steps:
      - name: Microsoft Teams Notification
        run: |
          STATUS="SUCCESS"
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]]; then
            STATUS="FAILED"
          fi

          PAYLOAD=$(cat <<EOF
          {
            "text": "Deployment finished with status: ${STATUS}",
            "status": "${STATUS}",
            "application": "FreeEdu",
            "branch": "${GITHUB_REF_NAME}",
            "sha": "${GITHUB_SHA}",
            "workflow": "${GITHUB_WORKFLOW}",
            "runNumber": "${GITHUB_RUN_NUMBER}",
            "runId": "${GITHUB_RUN_ID}",
            "actor": "${GITHUB_ACTOR}",
            "repository": "${GITHUB_REPOSITORY}",
            "runUrl": "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
          }
          EOF
          )

          echo "Sending Teams payload:"
          echo "${PAYLOAD}"

          curl --fail-with-body -X POST "${{ secrets.TEAMS_WEBHOOK_URL }}" \
            -H "Content-Type: application/json" \
            -d "${PAYLOAD}"
