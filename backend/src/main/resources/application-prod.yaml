spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?useSSL=true&requireSSL=false&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations:
      - classpath:db/migration

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  main:
    banner-mode: "off"

management:
  endpoints:
    web:
      exposure:
        include: health, info
  endpoint:
    health:
      show-details: never
  health:
    mail:
      enabled: false
  server:
    add-application-context-header: false

server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: never
    whitelabel:
      enabled: false

application:
  frontend:
    base-url: ${FRONTEND_BASE_URL}
  mail:
    enabled: ${MAIL_ENABLED:true}
    from-address: ${MAIL_FROM_ADDRESS:no-reply@freeedu.pl}
    from-name: FreeEdu Production
  security:
    jwt:
      secret-key: ${JWT_SECRET_KEY}
      expiration: ${JWT_EXPIRATION:86400000}
    cors:
      allowed-origins: ${CORS_ALLOWED_ORIGINS:}
  stt:
    base-url: ${STT_BASE_URL}

logging:
  level:
    root: WARN
    pl.freeedu: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
  file:
    path: /home/LogFiles
    name: backend.log
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

springdoc:
  api-docs:
    enabled: false
  swagger-ui:
    enabled: false
